spring:
  application:
    name: movie-service

  datasource:
    url: jdbc:mysql://localhost:3306/moviedb
    username: root
    password: Pooja@1234
    driver-class-name: com.mysql.cj.jdbc.Driver


  eureka:
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka/
    instance:
      prefer-ip-address: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    web:
      pageable:
        default-page-size: 10
        max-page-size: 20
        one-indexed-parameters: true

server:
  port: 8081
  servlet:
    context-path: /api/v1