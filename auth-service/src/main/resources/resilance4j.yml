resilance4j:
  circuitbreaker:
    instances:
      authService:
        register-health-indicator: true
        sliding-window-size: 10
        failure-rate-threadshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

  retry:
    instances:
      authService:
        maxAttempts: 3
        waitDuration: 2s


  bulkhead:
    instances:
      bookingService:
        max-concurrent-calls: 10
        max-wait-duration: 10ms

  ratelimiter:
    instances:
      bookingService:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 0s

feign:
  circuitbreaker:
    enabled:
      true